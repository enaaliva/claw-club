<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo diary Bobo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Crafty+Girls&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/gallery.css" />
  </head>
  <body>
    <main class="gallery-page">
      <!--note book-->
      <div class="notebook">
        <!--left side-->
        <div class="left-gallery"></div>
        <!--right side-->

          <div class="photo-grid"></div>

      </div>
      <!--Notebook tabs-->
      <div class="tabs">
        <a href="gallery.html" class="tab">
          <img src="../assets/images/icons/tab-bobo.png" alt="Bobo" />
        </a>

        <a href="gallery-emma.html" class="tab active">
          <img src="../assets/images/icons/tab-emma.png" alt="Emma" />
        </a>
        <a href="gallery-minnu.html" class="tab">
          <img src="../assets/images/icons/tab-minnu.png" alt="Minnu" />
        </a>
      </div>

      <!--button-->
      <a href="../index.html" class="home-btn">
        <img src="../assets/images/elements/BUTTON.png" alt="home" />
      </a>
    </main>
  </body>
</html>
